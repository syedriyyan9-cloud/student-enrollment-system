<!DOCTYPE html>
<html>
<head>
    <title>Submission Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .success-container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        .success-icon {
            color: #4caf50;
            font-size: 60px;
            margin-bottom: 20px;
        }
        .success-message {
            font-size: 24px;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .login-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3f51b5;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .login-link:hover {
            background-color: #354497;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <div class="success-message">Successfully Submitted!</div>
        <p>Your information has been received. You can now log in to access your account.</p>
        <a href="{% url 'login' %}" class="login-link">Go to Login</a>
    </div>
</body>
</html>
